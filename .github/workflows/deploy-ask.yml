# Keeps the "Ask this essay" feature in sync with the live site.
#
# Whenever a push to main changes the HTML, the corpus builder, or the
# Edge Function source, this workflow:
#   1. Regenerates both corpora (ask + ask-org) from the current HTML.
#   2. Commits the regenerated corpus back to main if it drifted.
#   3. Redeploys both Supabase Edge Functions so the live Ask answers
#      are grounded on the latest content.
#
# Credentials are read from repository Secrets:
#   - SUPABASE_ACCESS_TOKEN  (personal access token)
#   - SUPABASE_PROJECT_REF   (e.g. keqyzinkkerwvztmrhyz)

name: Deploy Ask corpora and Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'ai-org/index.html'
      - 'scripts/build-corpus.mjs'
      - 'supabase/functions/ask/**'
      - 'supabase/functions/ask-org/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-ask.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate both corpora
        run: npm run build:corpus:all

      - name: Commit regenerated corpus if drifted
        run: |
          if [ -n "$(git status --porcelain supabase/functions/)" ]; then
            echo "Corpus drift detected. Committing regenerated files."
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add supabase/functions/ask/corpus.json \
                    supabase/functions/ask/corpus.ts \
                    supabase/functions/ask-org/corpus.json \
                    supabase/functions/ask-org/corpus.ts
            git commit -m "chore: regenerate Ask corpora from latest HTML

          Auto-generated by the deploy-ask workflow because the HTML
          changed but the committed corpus was stale. This keeps the
          Edge Functions grounded on what readers actually see."
            git push
          else
            echo "Corpus already up to date. Skipping commit."
          fi

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy ask Edge Function (root SDLC page)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy ask \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy ask-org Edge Function (AI Org essay page)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy ask-org \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
